<div id="data">กำลังโหลด...</div>

<script>
  async function loadData() {
    const response = await fetch('https://your-worker.workers.dev/api/users');
    const users = await response.json();
    
    document.getElementById('data').innerHTML = users
      .map(u => `<p>ID: ${u.id} - Name: ${u.name}</p>`)
      .join('');
  }

  loadData();
</script>
